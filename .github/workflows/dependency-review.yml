name: dependency-review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: dependency-review-${github.ref}
  cancel-in-progress: ${github.event_name == "pull_request"}

jobs:
  dependency-review:
    name: Dependency review
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-dependency-review.yml@f4b2971fd38896d033a3bcfe0ee079368c7fd6fc # 0.3.0
