name: release

on:
  push:
    tags:
      # Stable numeric releases only. Prerelease tags (X.Y.Z-*) stay ruleset-
      # protected but are cut manually: the shared supply-chain workflow
      # publishes as the "latest" release without prerelease marking.
      - "[0-9]+.[0-9]+.[0-9]+"

permissions: {}

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish attested immutable release
    permissions:
      contents: write # Create the immutable release and its exact assets.
      id-token: write # Exchange workflow identity for attestations.
      attestations: write # Publish provenance and SBOM attestations.
      artifact-metadata: write # Record the actions/attest artifact storage entry (required at v4.1.1).
    uses: NDDev-it-com/ci-workflows/.github/workflows/release-supply-chain.yml@2ccb80e96f5771b6a6b4eae63a4f47e232906dc7 # 0.12.0
    with:
      version: ${{ github.ref_name }}
      package_name: nddev-zcode-app
      archive_paths: >-
        README.md LICENSE NOTICE VERSION CHANGELOG.md SECURITY.md SUPPORT.md
        CODE_OF_CONDUCT.md CONTRIBUTING.md .gitignore .github build cli-tools
        config docs references zcode_tools
      runtime_paths: >-
        VERSION LICENSE NOTICE README.md build cli-tools config references
        zcode_tools
