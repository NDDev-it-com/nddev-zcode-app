name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-pre"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag matches VERSION
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(cat VERSION)"
          if [ "$tag" != "$version" ]; then
            echo "::error::Tag '$tag' does not match VERSION '$version'"
            exit 1
          fi
          echo "ok: tag $tag == VERSION $version"

      - name: Extract changelog section
        id: changelog
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Extract the matching ## [TAG] section from CHANGELOG.md (up to the next ##).
          body=$(awk -v tag="## [${tag}]" '
            $0 == tag { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$body" ]; then
            body="Release $tag. See CHANGELOG.md for details."
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-pre') }}
          generate_release_notes: false
