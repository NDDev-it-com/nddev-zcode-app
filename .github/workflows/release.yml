name: release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
      - "[0-9]+.[0-9]+.[0-9]+-pre"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Verify tag and version contracts
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          version="$(cat VERSION)"
          version_json="$(python3 -c 'import json; print(json.load(open("build/version.json"))["build_version"])')"
          manifest_json="$(python3 -c 'import json; print(json.load(open("build/manifest.json"))["build_version"])')"
          marketplace_plugin="$(python3 -c 'import json; plugins=json.load(open("zcode_tools/marketplaces/nddev-builder/marketplace.json"))["plugins"]; print(next(plugin["version"] for plugin in plugins if plugin["name"] == "core"))')"
          plugin_manifest="$(python3 -c 'import json; print(json.load(open("zcode_tools/marketplaces/nddev-builder/plugins/core/.zcode-plugin/plugin.json"))["version"])')"
          if [ "$tag" != "$version" ] || [ "$version" != "$version_json" ] || [ "$version" != "$manifest_json" ]; then
            echo "::error::Tag and build versions differ: tag=$tag VERSION=$version version.json=$version_json manifest.json=$manifest_json"
            exit 1
          fi
          if [ "$marketplace_plugin" != "$plugin_manifest" ]; then
            echo "::error::Core plugin versions differ: marketplace=$marketplace_plugin plugin.json=$plugin_manifest"
            exit 1
          fi
          echo "ok: tag and build versions match $version"
          echo "ok: core plugin versions match $plugin_manifest"

      - name: Extract changelog section
        id: changelog
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME}"
          # Extract the matching ## [TAG] section from CHANGELOG.md (up to the next ##).
          # Match the heading prefix (## [TAG] may be followed by " - YYYY-MM-DD").
          body=$(awk -v tag="## [${tag}]" '
            index($0, tag) == 1 { found=1; next }
            found && /^## \[/ { exit }
            found { print }
          ' CHANGELOG.md | sed '/^[[:space:]]*$/d')
          if [ -z "$body" ]; then
            body="Release $tag. See CHANGELOG.md for details."
          fi
          {
            echo "body<<EOF"
            echo "$body"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@72f2c25fcb47643c292f7107632f7a47c1df5cd8 # v2.3.2
        with:
          name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-pre') }}
          generate_release_notes: false
