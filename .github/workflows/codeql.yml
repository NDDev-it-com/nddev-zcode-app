name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 7 * * 1"

permissions: {}

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    name: CodeQL
    permissions:
      contents: read
      security-events: write # Publish CodeQL analysis to code scanning.
      actions: read # Read workflow metadata for the actions language.
    uses: NDDev-it-com/ci-workflows/.github/workflows/public-codeql.yml@eb7bd953dc9741e559cb9e357c2d36c9b4de5a88 # 0.10.0
    with:
      languages: '["actions"]'
      queries: security-and-quality
