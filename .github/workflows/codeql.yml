name: codeql

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "20 7 * * 1"

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  codeql:
    name: CodeQL
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-codeql.yml@f4b2971fd38896d033a3bcfe0ee079368c7fd6fc # 0.3.0
    with:
      languages: '["python", "actions"]'
      queries: security-and-quality
