name: labeler

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

jobs:
  label:
    name: Label PR
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Apply labels
        uses: actions/labeler@8c99a5ebc4f7a2f27484f4d646f0a8eeb536e83e # v6.0.0
        with:
          configuration-path: .github/labeler.yml
          sync-labels: true
