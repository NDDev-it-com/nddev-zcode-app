name: security-static

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "30 6 * * 1"

permissions:
  contents: read

concurrency:
  group: security-static-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  action-pins:
    name: Action pins (full SHA)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Check GitHub Actions are pinned to full SHAs
        run: |
          set -euo pipefail
          bad=0
          while IFS= read -r line; do
            uses=$(printf '%s' "$line" | sed -E 's/.*uses:\s*//; s/@.*//; s/#.*//')
            ref=$(printf '%s' "$line" | sed -E 's/.*@//; s/\s.*//; s/#.*//')
            # Skip local actions (./...) and reusable-workflow calls (no @version).
            case "$uses" in ./*) continue ;; esac
            if [ -n "$ref" ] && ! printf '%s' "$ref" | grep -Eq '^[0-9a-f]{40}$'; then
              echo "::warning::$uses is pinned to '$ref' (not a full SHA)"
              bad=1
            fi
          done < <(grep -rnE '^\s*uses:\s' .github/workflows/ 2>/dev/null || true)
          if [ "$bad" -ne 0 ]; then
            echo "::error::One or more actions are not pinned to a full commit SHA."
            exit 1
          fi
          echo "ok: all actions pinned to full SHAs"
