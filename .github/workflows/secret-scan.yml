name: secret-scan

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: secret-scan-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  secret-scan:
    name: Secret scan
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/secret-scan.yml@d1bb39730a45bae1e8c507477bb15c5e05a2b412 # 0.5.0
