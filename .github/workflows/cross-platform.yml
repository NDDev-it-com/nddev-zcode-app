name: cross-platform

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  cross-platform-smoke:
    name: Cross-platform smoke
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/cross-platform-smoke.yml@f4b2971fd38896d033a3bcfe0ee079368c7fd6fc # 0.3.0
    with:
      os_list: '["ubuntu-latest", "macos-latest"]'
      python_version: "3.13"
      command: |
        set -euo pipefail
        for f in \
          build/version.json \
          build/manifest.json \
          config/nddev-contract.json \
          references/zcode-baseline.json; do
          python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
        done
        for f in \
          zcode_tools/marketplaces/*/marketplace.json \
          zcode_tools/marketplaces/*/cli-config.template.json \
          zcode_tools/marketplaces/*/v2-config.template.json \
          zcode_tools/marketplaces/*/v2-setting.template.json \
          zcode_tools/marketplaces/*/plugins/*/.zcode-plugin/plugin.json; do
          [ -f "$f" ] && python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
        done
        MP="$(ls zcode_tools/marketplaces | head -1)"
        cli-tools/scripts/install.sh install --marketplace "$MP" --platform "$([ "$(uname -s)" = "Darwin" ] && echo macos || echo ubuntu)" --plan
