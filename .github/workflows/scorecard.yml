name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "40 7 * * 1"

permissions:
  contents: read
  actions: read
  id-token: write

concurrency:
  group: scorecard-${{github.ref}}
  cancel-in-progress: false

jobs:
  scorecard:
    name: OpenSSF Scorecard
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-scorecard-json.yml@1acba687361415b3f5942acceb40b228bb0387fd # 0.3.0
