name: scorecard

on:
  push:
    branches: [main]
  schedule:
    - cron: "40 7 * * 1"

permissions: {}

concurrency:
  group: scorecard-${{github.ref}}
  cancel-in-progress: false

jobs:
  scorecard:
    name: OpenSSF Scorecard
    permissions:
      contents: read
      actions: read # Inspect workflow metadata for Scorecard checks.
      id-token: write # Obtain OIDC identity for the Scorecard artifact.
    uses: NDDev-it-com/nddev-ci-workflows/.github/workflows/public-scorecard-json.yml@d1bb39730a45bae1e8c507477bb15c5e05a2b412 # 0.5.0
