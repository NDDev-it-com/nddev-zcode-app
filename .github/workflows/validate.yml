name: validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  validate:
    name: Validate (ubuntu)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.0.0
        with:
          python-version: "3.13"

      - name: Validate JSON files
        run: |
          set -euo pipefail
          echo "::group::Validate JSON"
          # Repo-level static config files.
          for f in \
            build/version.json \
            build/manifest.json \
            config/nddev-contract.json \
            references/zcode-baseline.json; do
            if [ -f "$f" ]; then
              python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
              echo "ok: $f"
            fi
          done
          # All marketplace-scoped JSON (config templates, marketplace manifests, plugins).
          for f in \
            zcode_tools/marketplaces/*/marketplace.json \
            zcode_tools/marketplaces/*/cli-config.template.json \
            zcode_tools/marketplaces/*/v2-config.template.json \
            zcode_tools/marketplaces/*/v2-setting.template.json \
            zcode_tools/marketplaces/*/hooks.json \
            zcode_tools/marketplaces/*/mcp.json \
            zcode_tools/marketplaces/*/plugins/*/.zcode-plugin/plugin.json; do
            if [ -f "$f" ]; then
              python3 -c "import json,sys; json.load(open(sys.argv[1]))" "$f"
              echo "ok: $f"
            fi
          done
          echo "::endgroup::"

      - name: No secrets tracked
        run: |
          set -euo pipefail
          if git ls-files | grep -E '(^|/)\.env$'; then
            echo "::error::An .env file is tracked by git — secrets must never be committed."
            exit 1
          fi
          echo "ok: no .env tracked"

      - name: ShellCheck installer
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          severity: warning
          additional_paths: cli-tools/scripts

      - name: Installer plan (dry-run)
        run: |
          cli-tools/scripts/install.sh install --marketplace "$(ls zcode_tools/marketplaces | head -1)" --platform ubuntu --plan
