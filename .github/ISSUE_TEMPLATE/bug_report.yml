name: Bug report
description: Report a defect in the installer, source config, or build artifacts.
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. For security issues, use
        a private advisory instead (see SECURITY.md).
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Minimal steps to reproduce.
    validations:
      required: true
  - type: textarea
    id: env
    attributes:
      label: Environment
      description: OS, ZCode client version, Python version, and BUILD-VERSION contents.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: The `--plan` or `--apply` output. Sanitize secrets first.
